<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5業務資料エディタ - Pro Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=M+PLUS+1p:wght@400;700&display=swap');

  :root {
    --bg: #e8e2da;
    --paper: #ffffff;
    --ink: #1a1a1a;
    --toolbar-bg: #2c3e50;
    --toolbar-text: #ecf0f1;
    --highlight-yellow: #fff176;
    --margin-lr: 25.4mm;
    --margin-tb: 30mm;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'M PLUS 1p', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  /* ===== TOOLBAR ===== */
  .toolbar-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    width: 182mm;
    max-width: 100%;
  }

  .toolbar {
    background: var(--toolbar-bg);
    border-radius: 8px 8px 0 0;
    padding: 7px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }

  .tg {
    display: flex;
    gap: 3px;
    align-items: center;
    padding: 0 5px;
    border-right: 1px solid rgba(255,255,255,0.12);
  }
  .tg:last-child { border-right: none; }

  .toolbar button, .toolbar select {
    font-family: 'M PLUS 1p', sans-serif;
  }
  .toolbar button {
    background: rgba(255,255,255,0.1);
    color: var(--toolbar-text);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 4px 9px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.22); }
  .toolbar button.active { background: rgba(255,255,255,0.32); border-color: rgba(255,255,255,0.45); }

  .toolbar select {
    background: rgba(255,255,255,0.12);
    color: var(--toolbar-text);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 4px 5px;
    font-size: 11px;
  }

  .btn-bold { font-weight: 700; }
  .btn-red { color: #e74c3c !important; }
  .btn-hl { background: var(--highlight-yellow) !important; color: #333 !important; }
  .btn-add-sec { background: #27ae60 !important; color: #fff !important; border-color: #27ae60 !important; }
  .btn-img { background: #8e44ad !important; color: #fff !important; }
  .btn-export { background: #2980b9 !important; color: #fff !important; }
  .btn-import { background: #16a085 !important; color: #fff !important; }

  .font-size-btn { min-width: 28px; text-align: center; }
  .font-size-btn.sz-active { background: rgba(255,255,255,0.4) !important; font-weight: 700; }

  .bottom-bar {
    background: var(--toolbar-bg);
    border-radius: 0 0 8px 8px;
    padding: 6px 10px;
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: space-between;
  }
  .status-msg { color: rgba(255,255,255,0.5); font-size: 10px; font-style: italic; }
  .bottom-bar button {
    background: #2980b9;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    font-family: 'M PLUS 1p', sans-serif;
  }

  /* ===== PAPER ===== */
  .paper {
    width: 182mm;
    max-width: 100%;
    background: var(--paper);
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    min-height: 257mm;
  }

  .section {
    padding: 0;
    position: relative;
  }
  .section + .section { border-top: 2px dashed #ccc; }

  .section-tab {
    display: flex;
    align-items: center;
    padding: 8px 12px 0 12px;
    transition: padding-left 0.2s ease;
  }

  .tab-label {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 4px 4px 0 0;
    font-size: 13px;
    font-weight: 700;
    color: #333;
    box-shadow: 1px -1px 3px rgba(0,0,0,0.08);
    outline: none;
    min-width: 50px;
    cursor: text;
  }

  .section-controls {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .section-controls button {
    background: none;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 15px;
    padding: 2px 5px;
  }
  .section-controls button:hover { color: #666; }

  .tab-underline {
    margin: 0 12px;
    height: 2px;
    background: linear-gradient(90deg, #ccc, #ddd, transparent);
  }

  .section-content {
    padding: 10px 25.4mm 20px 25.4mm;
    min-height: 60px;
    outline: none;
    font-size: 14px;
    line-height: 1.85;
    overflow-wrap: break-word;
  }

  .section-content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 10px 0;
  }

  .section.collapsed .section-content,
  .section.collapsed .tab-underline { display: none; }

  .section-content.fs-small { font-size: 11px; }
  .section-content.fs-medium { font-size: 14px; }
  .section-content.fs-large { font-size: 18px; }

  /* Tab colors */
  .section:nth-child(8n+1) .tab-label { background: #4ECDC4; }
  .section:nth-child(8n+2) .tab-label { background: #FF6B6B; }
  .section:nth-child(8n+3) .tab-label { background: #45B7D1; }
  .section:nth-child(8n+4) .tab-label { background: #96CEB4; }
  .section:nth-child(8n+5) .tab-label { background: #FFEAA7; }
  .section:nth-child(8n+6) .tab-label { background: #DDA0DD; }
  .section:nth-child(8n+7) .tab-label { background: #98D8C8; }
  .section:nth-child(8n+8) .tab-label { background: #F7DC6F; }

  /* Page break indicator */
  .section + .section::before {
    content: '✂ 改ページ';
    display: block;
    text-align: center;
    font-size: 10px;
    color: #bbb;
    padding: 2px 0;
    letter-spacing: 2px;
  }

  @media print {
    @page { size: 182mm 257mm; margin: 30mm 25.4mm; }
    .toolbar-wrap, .bottom-bar, .section-controls { display: none !important; }
    .paper { box-shadow: none; width: 100%; }
    .section + .section { break-before: page; border-top: none; }
    .section + .section::before { display: none; }
    .section.collapsed .section-content { display: block !important; }
    .section-content { padding-left: 0; padding-right: 0; }
  }

  /* Loading overlay */
  .loading-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    justify-content: center;
    align-items: center;
  }
  .loading-overlay.active { display: flex; }
  .loading-box {
    background: #fff;
    padding: 24px 36px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #333;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-box" id="loadingMsg">処理中...</div>
</div>

<div class="toolbar-wrap">
  <div class="toolbar">
    <div class="tg">
      <button class="btn-bold" onclick="execCmd('bold')">B</button>
      <button class="btn-red" onclick="execCmd('foreColor','#e74c3c')">赤</button>
      <button class="btn-img" onclick="triggerImgInput()">🖼 画像</button>
    </div>
    <div class="tg">
      <select id="hlMode">
        <option value="bg">背景色</option>
        <option value="ul">下線</option>
      </select>
      <button class="btn-hl" onclick="applyHighlight()">蛍光</button>
    </div>
    <div class="tg">
      <button class="font-size-btn sz-active" onclick="setFontSize('small',this)">小</button>
      <button class="font-size-btn" onclick="setFontSize('medium',this)">中</button>
      <button class="font-size-btn" onclick="setFontSize('large',this)">大</button>
    </div>
    <div class="tg">
      <button class="btn-add-sec" onclick="addSection()">＋ セクション</button>
    </div>
    <div class="tg">
      <button class="btn-export" onclick="exportZip()">📦 ZIP出力</button>
      <button class="btn-import" onclick="document.getElementById('zipInput').click()">📂 ZIP読込</button>
    </div>
    <div class="tg">
      <button onclick="clearAllData()" style="background:#c0392b">全消去</button>
    </div>
  </div>
</div>

<input type="file" id="imgInput" style="display:none" accept="image/*" onchange="handleImgUpload(this)">
<input type="file" id="zipInput" style="display:none" accept=".zip" onchange="importZip(this)">

<div class="paper" id="paper"></div>

<div class="toolbar-wrap">
  <div class="bottom-bar">
    <span class="status-msg" id="statusMsg">Ready</span>
    <button onclick="window.print()">🖨 印刷 / PDF保存</button>
  </div>
</div>

<script>
  let currentFontSize = 'small';
  const TAB_STEP = 60;
  const STEPS_BEFORE_WRAP = 5;

  // ===== Utility =====
  function showLoading(msg) {
    document.getElementById('loadingMsg').textContent = msg || '処理中...';
    document.getElementById('loadingOverlay').classList.add('active');
  }
  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('active');
  }
  function setStatus(msg) {
    document.getElementById('statusMsg').textContent = msg;
  }
  function debounce(func, wait) {
    let timeout;
    return function() {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, arguments), wait);
    };
  }

  // ===== LocalStorage =====
  function saveToLocal() {
    const data = [];
    document.querySelectorAll('.section').forEach(sec => {
      data.push({
        label: sec.querySelector('.tab-label').innerText,
        content: sec.querySelector('.section-content').innerHTML,
        collapsed: sec.classList.contains('collapsed')
      });
    });
    localStorage.setItem('B5GyoumuData', JSON.stringify({
      fontSize: currentFontSize,
      sections: data
    }));
    const now = new Date();
    setStatus(`保存 ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`);
  }

  function loadFromLocal() {
    const raw = localStorage.getItem('B5GyoumuData');
    if (!raw) { addSection(); return; }
    const store = JSON.parse(raw);
    currentFontSize = store.fontSize || 'small';
    syncFontSizeUI();
    store.sections.forEach(s => addSection(s.label, s.content, s.collapsed));
  }

  function syncFontSizeUI() {
    const label = currentFontSize === 'small' ? '小' : (currentFontSize === 'medium' ? '中' : '大');
    document.querySelectorAll('.font-size-btn').forEach(b => {
      b.classList.toggle('sz-active', b.textContent === label);
    });
  }

  function clearAllData() {
    if (confirm('全てのデータを消去しますか？')) {
      localStorage.removeItem('B5GyoumuData');
      location.reload();
    }
  }

  // ===== Section Management =====
  function addSection(labelVal = '新規項目', contentVal = '', isCollapsed = false) {
    const sec = document.createElement('div');
    sec.className = 'section' + (isCollapsed ? ' collapsed' : '');
    sec.innerHTML = `
      <div class="section-tab">
        <div class="tab-label" contenteditable="true">${labelVal}</div>
        <div class="section-controls">
          <button onclick="toggleCollapse(this)" title="折りたたみ">👁</button>
          <button onclick="moveSection(this,-1)">▲</button>
          <button onclick="moveSection(this,1)">▼</button>
          <button onclick="removeSection(this)">×</button>
        </div>
      </div>
      <div class="tab-underline"></div>
      <div class="section-content fs-${currentFontSize}" contenteditable="true">${contentVal}</div>
    `;
    document.getElementById('paper').appendChild(sec);
    updateTabOffsets();
    sec.addEventListener('input', debounce(saveToLocal, 1000));
  }

  function toggleCollapse(btn) {
    btn.closest('.section').classList.toggle('collapsed');
    saveToLocal();
  }

  function removeSection(btn) {
    if (confirm('削除しますか？')) {
      btn.closest('.section').remove();
      updateTabOffsets();
      saveToLocal();
    }
  }

  function moveSection(btn, dir) {
    const sec = btn.closest('.section');
    const paper = document.getElementById('paper');
    if (dir === -1 && sec.previousElementSibling) paper.insertBefore(sec, sec.previousElementSibling);
    else if (dir === 1 && sec.nextElementSibling) paper.insertBefore(sec.nextElementSibling, sec);
    updateTabOffsets();
    saveToLocal();
  }

  function updateTabOffsets() {
    document.querySelectorAll('.section').forEach((sec, i) => {
      const step = i % (STEPS_BEFORE_WRAP + 1);
      sec.querySelector('.section-tab').style.paddingLeft = (12 + step * TAB_STEP) + 'px';
    });
  }

  // ===== Features =====
  function setFontSize(sz, btn) {
    currentFontSize = sz;
    document.querySelectorAll('.font-size-btn').forEach(b => b.classList.remove('sz-active'));
    btn.classList.add('sz-active');
    document.querySelectorAll('.section-content').forEach(el => {
      el.classList.remove('fs-small', 'fs-medium', 'fs-large');
      el.classList.add('fs-' + sz);
    });
    saveToLocal();
  }

  function triggerImgInput() { document.getElementById('imgInput').click(); }

  function handleImgUpload(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      document.execCommand('insertHTML', false, `<img src="${e.target.result}" alt="uploaded image">`);
      saveToLocal();
    };
    reader.readAsDataURL(input.files[0]);
    input.value = '';
  }

  function execCmd(cmd, val) {
    document.execCommand(cmd, false, val || null);
    saveToLocal();
  }

  function applyHighlight() {
    const mode = document.getElementById('hlMode').value;
    if (mode === 'bg') {
      execCmd('hiliteColor', '#fff176');
    } else {
      const sel = window.getSelection();
      if (!sel.rangeCount || sel.isCollapsed) return;
      const span = document.createElement('span');
      span.style.borderBottom = '3px solid #fff176';
      try { sel.getRangeAt(0).surroundContents(span); } catch(e) { execCmd('underline'); }
      saveToLocal();
    }
  }

  // ===== ZIP EXPORT =====
  async function exportZip() {
    showLoading('ZIP生成中...');
    try {
      const zip = new JSZip();
      const sections = document.querySelectorAll('.section');
      const manifest = {
        version: 2,
        fontSize: currentFontSize,
        exportDate: new Date().toISOString(),
        sections: []
      };

      let imgIndex = 0;

      for (let i = 0; i < sections.length; i++) {
        const sec = sections[i];
        const label = sec.querySelector('.tab-label').innerText;
        let content = sec.querySelector('.section-content').innerHTML;
        const collapsed = sec.classList.contains('collapsed');

        // Extract images from content, save as separate files
        const imgRegex = /src="data:(image\/[^;]+);base64,([^"]+)"/g;
        let match;
        const images = [];

        while ((match = imgRegex.exec(content)) !== null) {
          const mimeType = match[1];
          const ext = mimeType.split('/')[1].replace('jpeg', 'jpg');
          const fileName = `images/img_${imgIndex}.${ext}`;
          const base64Data = match[2];

          // Add image file to ZIP
          zip.file(fileName, base64Data, { base64: true });

          // Replace data URI with relative path in content
          content = content.replace(match[0], `src="${fileName}"`);
          images.push({ file: fileName, mime: mimeType });
          imgIndex++;
        }

        // Re-run regex on updated content (reset lastIndex)
        // Actually we need to rebuild since we modified content in-place
        // The replace above handles it

        manifest.sections.push({
          index: i,
          label: label,
          collapsed: collapsed,
          images: images
        });

        // Save section content as HTML fragment
        zip.file(`sections/section_${i}.html`, content);
      }

      // Save manifest
      zip.file('manifest.json', JSON.stringify(manifest, null, 2));

      // Generate and download
      const blob = await zip.generateAsync({
        type: 'blob',
        compression: 'DEFLATE',
        compressionOptions: { level: 6 }
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const date = new Date();
      const dateStr = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}_${String(date.getHours()).padStart(2,'0')}${String(date.getMinutes()).padStart(2,'0')}`;
      a.href = url;
      a.download = `B5資料_${dateStr}.zip`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      setStatus(`ZIP出力完了 (${sections.length}セクション)`);
    } catch (err) {
      alert('ZIP出力エラー: ' + err.message);
      console.error(err);
    }
    hideLoading();
  }

  // ===== ZIP IMPORT =====
  async function importZip(input) {
    if (!input.files || !input.files[0]) return;
    
    const mergeMode = document.querySelectorAll('.section').length > 0
      ? confirm('現在のデータに追加しますか？\n「OK」= 追加　「キャンセル」= 置き換え')
      : false;

    showLoading('ZIP読込中...');
    try {
      const file = input.files[0];
      const arrayBuf = await file.arrayBuffer();
      const zip = await JSZip.loadAsync(arrayBuf);

      // Read manifest
      const manifestFile = zip.file('manifest.json');
      if (!manifestFile) throw new Error('manifest.json が見つかりません');
      const manifest = JSON.parse(await manifestFile.async('string'));

      // Clear existing if not merging
      if (!mergeMode) {
        document.getElementById('paper').innerHTML = '';
      }

      // Set font size from manifest
      if (manifest.fontSize) {
        currentFontSize = manifest.fontSize;
        syncFontSizeUI();
      }

      // Load each section
      for (const secData of manifest.sections) {
        const contentFile = zip.file(`sections/section_${secData.index}.html`);
        if (!contentFile) continue;
        let content = await contentFile.async('string');

        // Restore images: replace relative paths with data URIs
        if (secData.images && secData.images.length > 0) {
          for (const img of secData.images) {
            const imgFile = zip.file(img.file);
            if (imgFile) {
              const base64 = await imgFile.async('base64');
              // Replace all occurrences of this image path
              content = content.split(`src="${img.file}"`).join(`src="data:${img.mime};base64,${base64}"`);
            }
          }
        }

        addSection(secData.label, content, secData.collapsed || false);
      }

      updateTabOffsets();
      saveToLocal();
      setStatus(`ZIP読込完了 (${manifest.sections.length}セクション)`);
    } catch (err) {
      alert('ZIP読込エラー: ' + err.message);
      console.error(err);
    }
    hideLoading();
    input.value = '';
  }

  // ===== Init =====
  window.onload = loadFromLocal;
</script>
</body>
</html>
