<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B5業務資料エディタ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=M+PLUS+1p:wght@400;700&display=swap');

  :root {
    --bg: #e8e2da;
    --paper: #ffffff;
    --ink: #1a1a1a;
    --toolbar-bg: #2c3e50;
    --toolbar-text: #ecf0f1;
    --highlight-yellow: #fff176;
    --margin-lr: 25.4mm;
    --margin-tb: 30mm;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', 'M PLUS 1p', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  /* ===== TOOLBAR (sticky top) ===== */
  .toolbar-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    width: 182mm;
    max-width: 100%;
  }

  .toolbar {
    background: var(--toolbar-bg);
    border-radius: 8px 8px 0 0;
    padding: 7px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }

  .tg {
    display: flex;
    gap: 3px;
    align-items: center;
    padding: 0 5px;
    border-right: 1px solid rgba(255,255,255,0.12);
  }
  .tg:last-child { border-right: none; }

  .toolbar button, .toolbar select {
    font-family: 'M PLUS 1p', sans-serif;
  }
  .toolbar button {
    background: rgba(255,255,255,0.1);
    color: var(--toolbar-text);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 4px 9px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.22); }
  .toolbar button.active { background: rgba(255,255,255,0.32); border-color: rgba(255,255,255,0.45); }

  .toolbar select {
    background: rgba(255,255,255,0.12);
    color: var(--toolbar-text);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 4px;
    padding: 4px 5px;
    font-size: 11px;
  }

  .btn-bold { font-weight: 700; }
  .btn-red { color: #e74c3c !important; }
  .btn-hl { background: var(--highlight-yellow) !important; color: #333 !important; }
  .btn-clear { color: #95a5a6 !important; }
  .btn-add-sec { background: #27ae60 !important; color: #fff !important; border-color: #27ae60 !important; }
  .btn-add-sec:hover { background: #2ecc71 !important; }

  .font-size-btn { min-width: 28px; text-align: center; }
  .font-size-btn.sz-active { background: rgba(255,255,255,0.4) !important; font-weight: 700; }

  .bottom-bar {
    background: var(--toolbar-bg);
    border-radius: 0 0 8px 8px;
    padding: 6px 10px;
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: space-between;
  }
  .bottom-bar span { color: rgba(255,255,255,0.4); font-size: 11px; }
  .bottom-bar button {
    background: #2980b9;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    font-family: 'M PLUS 1p', sans-serif;
    transition: all 0.12s;
  }
  .bottom-bar button:hover { background: #3498db; }

  /* ===== PAPER ===== */
  .paper {
    width: 182mm;
    max-width: 100%;
    background: var(--paper);
    box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    min-height: 257mm;
  }

  /* ===== SECTION ===== */
  .section {
    padding: 0;
    position: relative;
  }
  /* Every section after the first gets a page-break in print */
  .section + .section {
    border-top: 2px dashed #ccc;
  }

  /* Tab header */
  .section-tab {
    display: flex;
    align-items: center;
    padding: 8px 12px 0 12px;
    transition: padding-left 0.2s ease;
  }

  .tab-label {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 4px 4px 0 0;
    font-size: 13px;
    font-weight: 700;
    font-family: 'M PLUS 1p', sans-serif;
    color: #333;
    box-shadow: 1px -1px 3px rgba(0,0,0,0.08);
    outline: none;
    min-width: 50px;
    line-height: 1.4;
    cursor: text;
    position: relative;
  }

  .section-controls {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .section-controls button {
    background: none;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 15px;
    padding: 2px 5px;
    border-radius: 3px;
    transition: all 0.12s;
  }
  .section-controls button:hover { color: #666; background: rgba(0,0,0,0.05); }

  .tab-underline {
    margin: 0 12px;
    height: 2px;
    background: linear-gradient(90deg, #ccc, #ddd, transparent);
  }

  /* Section content */
  .section-content {
    padding: 10px 25.4mm 20px 25.4mm;
    min-height: 60px;
    outline: none;
    font-size: 14px;
    line-height: 1.85;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .section-content:empty::before {
    content: 'ここに本文を入力...';
    color: #ccc;
    pointer-events: none;
  }

  /* Font size classes for content */
  .section-content.fs-small { font-size: 11px; line-height: 1.7; }
  .section-content.fs-medium { font-size: 14px; line-height: 1.85; }
  .section-content.fs-large { font-size: 18px; line-height: 1.9; }

  /* Tab colors - 8 color rotation */
  .section:nth-child(8n+1) .tab-label { background: #4ECDC4; }
  .section:nth-child(8n+2) .tab-label { background: #FF6B6B; }
  .section:nth-child(8n+3) .tab-label { background: #45B7D1; }
  .section:nth-child(8n+4) .tab-label { background: #96CEB4; }
  .section:nth-child(8n+5) .tab-label { background: #FFEAA7; }
  .section:nth-child(8n+6) .tab-label { background: #DDA0DD; }
  .section:nth-child(8n+7) .tab-label { background: #98D8C8; }
  .section:nth-child(8n+8) .tab-label { background: #F7DC6F; }

  /* Dashed page break indicator */
  .section + .section::before {
    content: '✂ 改ページ';
    display: block;
    text-align: center;
    font-size: 10px;
    color: #bbb;
    padding: 2px 0;
    letter-spacing: 2px;
  }

  /* Highlight */
  .highlight-underline { border-bottom: 3px solid var(--highlight-yellow); }

  /* ===== PRINT ===== */
  @media print {
    @page {
      size: 182mm 257mm; /* B5 */
      margin: 30mm 25.4mm;
    }
    body { background: none; padding: 0; }
    .toolbar-wrap, .bottom-bar { display: none !important; }
    .paper {
      box-shadow: none;
      width: 100%;
      min-height: auto;
    }
    .section + .section {
      break-before: page;
      border-top: none;
    }
    .section + .section::before { display: none; }
    .section-controls { display: none; }
    .section-content {
      padding-left: 0;
      padding-right: 0;
    }
    .section-tab { /* keep dynamic padding-left for tab offsets */ }
    .tab-underline { margin-left: 0; margin-right: 0; }
  }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div class="toolbar-wrap">
  <div class="toolbar">
    <div class="tg">
      <button class="btn-bold" onclick="execCmd('bold')" title="太字 (Ctrl+B)">B</button>
      <button onclick="toggleUppercase()" title="大文字切替">A↑</button>
      <button class="btn-red" onclick="execCmd('foreColor','#e74c3c')" title="赤字">赤</button>
    </div>
    <div class="tg">
      <select id="hlMode" title="蛍光ペンモード">
        <option value="bg">背景色</option>
        <option value="ul">下線</option>
      </select>
      <button class="btn-hl" onclick="applyHighlight()" title="蛍光ペン">蛍光</button>
    </div>
    <div class="tg">
      <button class="btn-clear" onclick="clearFormat()" title="書式クリア">クリア</button>
    </div>
    <div class="tg">
      <button class="font-size-btn sz-active" data-sz="small" onclick="setFontSize('small',this)" title="小">小</button>
      <button class="font-size-btn" data-sz="medium" onclick="setFontSize('medium',this)" title="中">中</button>
      <button class="font-size-btn" data-sz="large" onclick="setFontSize('large',this)" title="大">大</button>
    </div>
    <div class="tg">
      <button class="btn-add-sec" onclick="addSection()">＋ セクション追加</button>
    </div>
  </div>
</div>

<!-- PAPER -->
<div class="paper" id="paper">
  <!-- sections injected here -->
</div>

<!-- BOTTOM BAR -->
<div class="toolbar-wrap">
  <div class="bottom-bar">
    <span>セクション = 印刷ページ</span>
    <button onclick="window.print()">🖨 印刷 / PDF保存</button>
  </div>
</div>

<script>
  let sectionCount = 0;
  let currentFontSize = 'small';
  const TAB_STEP = 60; // px per step
  const MAX_OFFSET = 300; // px max before wrapping back
  const STEPS_BEFORE_WRAP = Math.floor(MAX_OFFSET / TAB_STEP); // 5 steps

  // ===== Tab Offset (staircase, wraps back) =====
  function updateTabOffsets() {
    const sections = document.querySelectorAll('.section');
    sections.forEach((sec, i) => {
      const step = i % (STEPS_BEFORE_WRAP + 1); // 0,1,2,3,4,5,0,1,2...
      const offset = 12 + step * TAB_STEP;
      sec.querySelector('.section-tab').style.paddingLeft = offset + 'px';
    });
  }

  // ===== Section Management =====
  function addSection() {
    sectionCount++;
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-tab">
        <div class="tab-label" contenteditable="true">項目${sectionCount}</div>
        <div class="section-controls">
          <button onclick="moveSection(this,-1)" title="上へ">▲</button>
          <button onclick="moveSection(this,1)" title="下へ">▼</button>
          <button onclick="removeSection(this)" title="削除">×</button>
        </div>
      </div>
      <div class="tab-underline"></div>
      <div class="section-content fs-${currentFontSize}" contenteditable="true"></div>
    `;
    document.getElementById('paper').appendChild(sec);
    updateTabOffsets();
    // Focus tab for immediate naming
    const label = sec.querySelector('.tab-label');
    label.focus();
    document.execCommand('selectAll', false, null);
  }

  function removeSection(btn) {
    const sec = btn.closest('.section');
    if (document.querySelectorAll('.section').length <= 1) {
      if (!confirm('最後のセクションを削除しますか？')) return;
    }
    sec.remove();
    updateTabOffsets();
  }

  function moveSection(btn, dir) {
    const sec = btn.closest('.section');
    const paper = document.getElementById('paper');
    if (dir === -1 && sec.previousElementSibling) {
      paper.insertBefore(sec, sec.previousElementSibling);
    } else if (dir === 1 && sec.nextElementSibling) {
      paper.insertBefore(sec.nextElementSibling, sec);
    }
    updateTabOffsets();
  }

  // ===== Font Size (applies to ALL sections) =====
  function setFontSize(sz, btn) {
    currentFontSize = sz;
    document.querySelectorAll('.font-size-btn').forEach(b => b.classList.remove('sz-active'));
    btn.classList.add('sz-active');
    document.querySelectorAll('.section-content').forEach(el => {
      el.classList.remove('fs-small', 'fs-medium', 'fs-large');
      el.classList.add('fs-' + sz);
    });
  }

  // ===== Rich Text =====
  function execCmd(cmd, val) {
    document.execCommand(cmd, false, val || null);
  }

  function toggleUppercase() {
    const sel = window.getSelection();
    if (!sel.rangeCount || sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    const text = sel.toString();
    const span = document.createElement('span');
    span.textContent = (text === text.toUpperCase() && text !== text.toLowerCase())
      ? text.toLowerCase() : text.toUpperCase();
    range.deleteContents();
    range.insertNode(span);
  }

  function applyHighlight() {
    const mode = document.getElementById('hlMode').value;
    if (mode === 'bg') {
      execCmd('hiliteColor', '#fff176');
    } else {
      const sel = window.getSelection();
      if (!sel.rangeCount || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);
      const span = document.createElement('span');
      span.className = 'highlight-underline';
      try { range.surroundContents(span); } catch(e) { execCmd('underline'); }
    }
  }

  function clearFormat() {
    execCmd('removeFormat');
  }

  // ===== Keyboard Shortcuts =====
  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'b') { e.preventDefault(); execCmd('bold'); }
      if (e.key === 'p') { e.preventDefault(); window.print(); }
    }
  });

  // Init with first section
  addSection();
</script>
</body>
</html>
